controller_manager:
  ros__parameters:
    update_rate: 1000

    # The broadcaster sends the "where is the robot" data to MoveIt
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # The arm controller handles the 7-DOF trajectory planning
    panda_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # The hand controller handles the mimic gripper via a simple command
    hand_controller:
      type: position_controllers/GripperActionController

panda_arm_controller:
  ros__parameters:
    joints:
      - panda_joint1
      - panda_joint2
      - panda_joint3
      - panda_joint4
      - panda_joint5
      - panda_joint6
      - panda_joint7
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false

hand_controller:
  ros__parameters:
    # We only control the leader joint. 
    # Ignition Gazebo applies the mimic logic to the second finger automatically.
    joint: panda_finger_joint1
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity